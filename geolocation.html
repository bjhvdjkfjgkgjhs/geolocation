<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Location Map</title>
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  // Your public Mapbox token
  mapboxgl.accessToken = 'pk.eyJ1IjoiYm1kMjM0NTY3IiwiYSI6ImNtYThuOHN5YzA3dDAybnB1bzNxZDY3cW8ifQ.fx86lChOVdESr3OII-C2NA';

  // Create the map
  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v11',
    center: [0, 0], // Initial load location
    zoom: 2
  });

  // Add user location tracking control
  const geolocate = new mapboxgl.GeolocateControl({
    positionOptions: {
      enableHighAccuracy: true
    },
    trackUserLocation: true,
    showUserHeading: true
  });

  map.addControl(geolocate);

  // Center the map on the user's location when it loads
  map.on('load', () => {
    geolocate.trigger();
  });
</script>

</body>
</html>
